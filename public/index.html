<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>칼럼 콘텐츠 검사기</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>칼럼 콘텐츠 검사기</h1>
    <p class="subtitle">19세 미만 학생 대상 칼럼의 유해성 및 적합성을 검사합니다.</p>

    <div class="card">
      <div class="tab-group">
        <button class="tab-btn active" data-tab="text">텍스트 붙여넣기</button>
        <button class="tab-btn" data-tab="url">URL 입력</button>
      </div>

      <div id="tab-text" class="input-area active">
        <textarea id="input-text" placeholder="검사할 칼럼 본문을 붙여넣으세요..."></textarea>
      </div>
      <div id="tab-url" class="input-area">
        <input type="url" id="input-url" placeholder="https://example.com/article/..." />
      </div>

      <button class="btn-check" id="btn-check">검사하기</button>
    </div>

    <div id="loading"><span class="spinner"></span>AI가 분석 중입니다...</div>
    <div class="error-box" id="error-box"></div>

    <div id="result">
      <div class="card">
        <div id="verdict-badge"></div>
        <div id="violations-container"></div>
        <div id="image-results-container"></div> 
      </div>
      <p class="disclaimer">⚠️ AI 판단은 참고용이며 최종 확인은 담당자가 직접 해주세요. 본 도구의 판단 결과에 대한 법적·정책적 책임은 사용자에게 있습니다.</p>
      <!-- 쪽지 작성 섹션 -->
    <div id="message-section" style="display:none;">
      <div class="card">
        <p class="section-title">📨 쪽지 작성</p>
        <div class="message-type-group">
          <button class="msg-type-btn" data-type="수정">수정 요청</button>
          <button class="msg-type-btn" data-type="지양">지양 안내</button>
          <button class="msg-type-btn" data-type="삭제">삭제 안내</button>
          <button class="msg-type-btn" data-type="글자수미달">글자수 미달</button>
        </div>
        <button class="btn-check" id="btn-generate-msg" style="margin-top:12px;" disabled>
          쪽지 생성하기
        </button>
        <div id="message-loading" style="display:none;text-align:center;padding:16px;color:#555;">
          <span class="spinner"></span>쪽지 작성 중...
        </div>
        <div id="message-output" style="display:none;">
          <textarea id="message-text" style="height:260px;margin-top:14px;background:#f8fafc;"></textarea>
          <button class="btn-copy" id="btn-copy-msg">📋 복사하기</button>
        </div>
      </div>
    </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
